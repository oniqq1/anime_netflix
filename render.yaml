databases:
  - name: steins-gate
    plan: free
    databaseName: mysite
    user: mysite

services:
  - type: web
    plan: free
    name: steins-gate
    runtime: python
    buildCommand: './build.sh'
    startCommand: 'gunicorn core.asgi:application -k uvicorn.workers.UvicornWorker --chdir project'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stains-gate
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4